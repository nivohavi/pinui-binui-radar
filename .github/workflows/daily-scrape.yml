name: Daily Scrape

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC = 08:00 Israel time
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        working-directory: pipeline
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: pipeline
        run: npx playwright install chromium --with-deps

      - name: Run scrape pipeline
        working-directory: pipeline
        run: node run.js
        env:
          CI: true

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet givatayim-pinui-radar/listings.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "pinui-bot"
          git config user.email "bot@hithadshut.ai"
          git add givatayim-pinui-radar/listings.json
          git commit -m "daily: update listings $(date +%Y-%m-%d)"
          git push
